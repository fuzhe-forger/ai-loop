version: 1

workspace:
  provider: git-worktree
  root: /tmp/ai-loop/workspaces
  cleanup: keep-on-failure
  branch_prefix: ai-loop/

agent:
  executor: codex
  command: codex
  args:
    - exec
    - -s
    - workspace-write
    - -a
    - never
  timeout_sec: 1800
  max_iterations: 3

verify:
  commands:
    - name: python syntax
      command: python3 -m py_compile lib/ai_loop/*.py
      shell: true
      cwd: .
      timeout_sec: 120
      required: true
    - name: cli help
      command: ./bin/ai-loop --help
      shell: true
      cwd: .
      timeout_sec: 30
      required: true

safety:
  forbid_paths:
    - .env
    - secrets/
    - "*.pem"
    - id_rsa
  max_changed_files: 50
  max_diff_lines: 3000
  allow_network: false
  allow_push: false
  redact:
    enabled: true
    patterns:
      - "(?i)(token|secret|password|apikey|api_key)\\s*[=:]\\s*\\S+"
      - "AKIA[0-9A-Z]{16}"
      - "Bearer\\s+[A-Za-z0-9._-]+"

artifacts:
  root: runs
  log_tail_lines_for_retry: 200
  max_log_bytes: 10485760

